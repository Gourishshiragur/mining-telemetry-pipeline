# databricks.yml

bundle:
  name: mining_pipeline_bundle

resources:
  jobs:
    mining_job:
      name: mining_pipeline_job
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/bronze_batch.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/silver_processing.py

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/gold_metrics.py